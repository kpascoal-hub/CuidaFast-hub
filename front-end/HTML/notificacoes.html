<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuidaFast - Notificações</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/Notificaçao.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="../assets/logo-cuidafast.png" alt="CuidaFast" class="logo-img">
                    <span class="logo-text">CuidaFast</span>
                </div>
                
                <div class="header-actions">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="ph ph-list"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Modal Dropdown -->
    <div class="sidebar-dropdown" id="sidebarDropdown">
        <nav class="dropdown-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="home-cliente.html" class="nav-link">
                        <i class="ph ph-house"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class="ph ph-chat-circle"></i>
                        <span>Mensagens</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="notificacoes-cliente.html" class="nav-link active">
                        <i class="ph ph-bell"></i>
                        <span>Notificações</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class="ph ph-calendar"></i>
                        <span>Agendamentos</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class="ph ph-clock"></i>
                        <span>In Time</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <i class="ph ph-sign-out"></i>
                        <span>Sair</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">Suas Notificações</h1>
                <p class="page-subtitle">Acompanhe todas as atualizações importantes</p>
            </div>

            <!-- Filters -->
            <div class="notification-filters">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="ph ph-list"></i>
                        Todas
                    </button>
                    <button class="filter-btn" data-filter="unread">
                        <i class="ph ph-bell"></i>
                        Não Lidas
                    </button>
                    <button class="filter-btn" data-filter="messages">
                        <i class="ph ph-chat-circle"></i>
                        Mensagens
                    </button>
                    <button class="filter-btn" data-filter="appointments">
                        <i class="ph ph-calendar"></i>
                        Agendamentos
                    </button>
                    <button class="filter-btn" data-filter="promotions">
                        <i class="ph ph-gift"></i>
                        Promoções
                    </button>
                </div>
                
                <div class="filter-actions">
                    <button class="action-btn" id="markAllRead">
                        <i class="ph ph-check-circle"></i>
                        Marcar todas como lidas
                    </button>
                </div>
            </div>

            <!-- Notifications List -->
            <div class="notifications-container">
                <div class="notifications-list" id="notificationsList">
                    <!-- Notificações serão inseridas aqui via JavaScript -->
                </div>
                
                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">
                        <i class="ph ph-bell-slash"></i>
                    </div>
                    <h3>Nenhuma notificação encontrada</h3>
                    <p>Você não possui notificações para os filtros selecionados.</p>
                </div>
            </div>

            <!-- Load More -->
            <div class="load-more-container" id="loadMoreContainer">
                <button class="load-more-btn" id="loadMoreBtn">
                    <i class="ph ph-arrow-down"></i>
                    Carregar mais notificações
                </button>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="../JS/notificacoes-cliente.js"></script>
</body>
</html>
