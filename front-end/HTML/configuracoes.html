<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - CuidaFast</title>
  <link rel="stylesheet" href="../CSS/pages/configuracao.css">
</head>
<body>
  <header>
    <div class="logo">
      <span>Cuida</span><span class="fast">Fast</span>
    </div>
    <div class="header-right">
      <div class="menu-icon">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <div class="profile-pic"></div>
    </div>
  </header>

  <div class="container">
    <div class="sidebar">
      <a href="../HTML/home.html">Voltar</a>
    </div>
    <div class="content">
      <div class="card">
        <h2>Configurações</h2>

        <a href="../HTML/perfil.html" class="option">Perfil</a>
        <a href="../HTML/seguranca.html" class="option">Segurança</a>
        <a href="../HTML/atividades.html" class="option">Suas atividades</a>
        <a href="../HTML/login.html" class="option">Sair da conta</a>
        <a href="../HTML/excluir-conta.html" class="delete-account" id="deleteAccount">Excluir conta</a>

      </div>
    </div>
  </div>

  <script>
    document.getElementById("deleteAccount").addEventListener("click", function(event) {
      event.preventDefault(); // evita o redirecionamento automático
      const confirmar = confirm("⚠️ Tem certeza que deseja excluir sua conta? Essa ação não poderá ser desfeita.");
      if (confirmar) {
        window.location.href = this.href; // redireciona se confirmar
      }
    });
  </script>
</body>
</html>
