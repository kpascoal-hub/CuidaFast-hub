<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - CuidaFast</title>
  <link rel="stylesheet" href="../CSS/pages/configuracao.css">
</head>
<body>
  <header class="client-header">
  <div class="containerzin">
    <nav class="client-navbar">
      <!-- Logo no canto esquerdo -->
      <a href="../../index.html" class="client-brand">
        <img id="logoscuda" src="../assets/Logotipo_1_vetorizado.svg" 
             alt="CuidaFast Logo" width="200" height="90">
      </a>

      <!-- Menu Toggle -->
      <button type="button" class="menu-toggle" id="menuToggle">
        <i class="ph ph-list"></i>
      </button>

      <!-- User Profile (no canto direito) -->
      <div class="user-profile" id="userProfile">
        <div class="user-avatar">
         <img id="avatar" class="avatar" src="../assets/images.webp"
             alt="cuidafast">
        </div>
      </div>
    </nav>
  </div>
</header>


    <!-- Sidebar -->
    <aside class="client-sidebar" id="clientSidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="user-avatar-large">
         <img id="avatar" class="avatar" src="../assets/images.webp"
             alt="cuidafast">
                    </div>
                    <div class="user-details">
                        <h3 id="userName">João Silva</h3>
                        <p>Cliente desde 2024</p>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item active">
                        <a href="#" class="nav-link">
                            <i class="ph ph-house" aria-hidden="true"></i>
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="../HTMLmensagens.html" class="nav-link">
                            <i class="ph ph-chat-circle"></i>
                            <span>Mensagens</span>
                            <span class="nav-badge">3</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="../HTML/notificacao.html" class="nav-link">
                            <i class="ph ph-bell" aria-hidden="true"></i>
                            <span>Notificações</span>
                            <span class="nav-badge">5</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="in-time.html" class="nav-link">
                            <i class="ph ph-lightning"></i>
                            <span>InTime</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="../HTML/configuracoes.html" class="nav-link">
                            <i class="ph ph-gear"></i>
                            <span>Configurações</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" id="logoutBtn">
                            <i class="ph ph-sign-out"></i>
                            <span>Sair da conta</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>
  <div class="container">
    <div class="sidebar">
      <a href="../HTML/home.html">Voltar</a>
    </div>
    <div class="content">
      <div class="card">
        <h2>Configurações</h2>

        <a href="../HTML/perfil.html" class="option">Perfil</a>
        <a href="../HTML/seguranca.html" class="option">Segurança</a>
        <a href="../HTML/atividades.html" class="option">Suas atividades</a>
        <a href="../HTML/login.html" class="option">Sair da conta</a>
        <a href="../HTML/excluir-conta.html" class="delete-account" id="deleteAccount">Excluir conta</a>

      </div>
    </div>
  </div>

  <script>
    document.getElementById("deleteAccount").addEventListener("click", function(event) {
      event.preventDefault(); // evita o redirecionamento automático
      const confirmar = confirm("⚠️ Tem certeza que deseja excluir sua conta? Essa ação não poderá ser desfeita.");
      if (confirmar) {
        window.location.href = this.href; // redireciona se confirmar
      }
    });
  </script>
</body>
</html>
