<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento - CuidaFast</title>
  <link rel="stylesheet" href="pagamento.css">
</head>
<body>
  <div class="container">
    <div class="form-section">
      <a href="#" class="voltar">&lt; Voltar</a>
      <h1>Pagamento</h1>
      
      <div class="form-card">
        <p class="question">O local onde ocorrerá o serviço está correto?</p>
        <div class="toggle">
          <span>Não</span>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
          <span>Sim</span>
        </div>

        <form>
          <div class="row">
            <div class="input-group">
              <label>CEP</label>
              <input type="text" value="015001-002">
            </div>
            <div class="input-group">
              <label>Complemento</label>
              <input type="text" value="(55)11 0000-0000">
            </div>
          </div>

          <div class="row">
            <div class="input-group">
              <label>Logradouro</label>
              <input type="text" value="Rua zumbi dos palmares 201">
            </div>
            <div class="input-group">
              <label>Complemento</label>
              <input type="text" value="Apt 123">
            </div>
          </div>

          <div class="row">
            <div class="input-group">
              <label>Bairro</label>
              <input type="text" value="Liberdade">
            </div>
            <div class="input-group">
              <label>Cidade</label>
              <input type="text" value="São Paulo">
            </div>
            <div class="input-group">
              <label>Estado</label>
              <input type="text" value="SP">
            </div>
          </div>

          <button class="continuar">Continuar</button>
        </form>
      </div>
    </div>

    <div class="summary-section">
      <h2>Resumo da compra</h2>
      <div class="summary-item">
        <span>Serviço</span>
        <span>R$95<sup>00</sup></span>
      </div>
      <div class="summary-item">
        <span>Taxa</span>
        <span>R$10<sup>90</sup></span>
      </div>
      <hr>
      <div class="summary-item total">
        <span>Você pagará</span>
        <span>R$105<sup>90</sup></span>
      </div>
    </div>
  </div>
</body>
</html>
