<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil - CuidaFast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="editarperfilcuidador.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTUwIiBoZWlnaHQ9IjQwIiB2aWV3Qm94PSIwIDAgMTUwIDQwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgo8cmVjdCB3aWR0aD0iMTUwIiBoZWlnaHQ9IjQwIiByeD0iOCIgZmlsbD0iIzBiMzM0MiIvPgo8dGV4dCB4PSI1MCUiIHk9IjUwJSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNiIgZm9udC13ZWlnaHQ9ImJvbGQiPkN1aWRhRmFzdDwvdGV4dD4KPC9zdmc+" alt="Logo CuidaFast">
    </div>
    <div class="menu" aria-label="Abrir menu">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </header>

  <main class="container">
    <div class="card">
        <h1>Editar Perfil</h1>
      
        <div class="tabs" role="tablist">
          <button class="tab" aria-selected="false" onclick="window.location.href='PerfilCuidadorEditarInformaçõesPessoais.html'">Informações pessoais</button>
          <button class="tab active" aria-selected="true">Documentos</button>
        </div>
      
        <!-- Seção RG ou CNH -->
        <div class="upload-section">
          <div class="upload-title">RG ou CNH</div>
          <div class="upload-subtitle">Arquivo em PDF ou imagem (máx. 5MB)</div>
          <div class="upload-box" onclick="document.getElementById('upload-rg').click()">
            <button type="button" class="upload-button">Fazer Upload</button>
            <input type="file" id="upload-rg" accept=".pdf,.jpg,.jpeg,.png" hidden>
          </div>
        </div>
      
        <div class="divider"></div>
      
        <!-- Seção Certificações -->
        <div class="upload-section">
          <div class="upload-title">Certificações</div>
          <div class="upload-subtitle">Arquivo em PDF ou imagem (máx. 5MB)</div>
          <div class="upload-box" onclick="document.getElementById('upload-cert').click()">
            <button type="button" class="upload-button">Fazer Upload</button>
            <input type="file" id="upload-cert" accept=".pdf,.jpg,.jpeg,.png" hidden>
          </div>
        </div>
      
        <!-- Checkboxes de certificações -->
        <div class="certifications-section">
          <div class="certifications-title">Certificações</div>
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="idosos">
              <label for="idosos">Cuidador de idosos</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="criancas">
              <label for="criancas">Cuidador de crianças</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="pet">
              <label for="pet">Cuidador de pet</label>
            </div>
          </div>
        </div>
      
        <div class="buttons">
          <button type="submit" class="save">Salvar alterações</button>
          <button type="button" class="cancel">Cancelar</button>
        </div>
      </div>
  </main>

  <script>
    // Adicionar funcionalidade para alternar entre abas
    document.addEventListener('DOMContentLoaded', function() {
      const tabs = document.querySelectorAll('.tab');
      
      tabs.forEach(tab => {
        tab.addEventListener('click', function() {
          tabs.forEach(t => t.classList.remove('active'));
          this.classList.add('active');
        });
      });
    });
  </script>
</body>
</html>
