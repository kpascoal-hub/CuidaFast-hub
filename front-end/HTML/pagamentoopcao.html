<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método de Pagamento - CuidaFast</title>
  <link rel="stylesheet" href="pagamentoopcao.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <a href="#" class="voltar">&lt; Voltar</a>
      <h1>Método de pagamento</h1>

      <div class="payment-option">
        <label>
          <input type="radio" name="payment" value="pix">
          <div class="option-content">
            <img src="pix-icon.png" alt="Pix">
            <span>Pix</span>
          </div>
        </label>
      </div>

      <div class="payment-option">
        <label>
          <input type="radio" name="payment" value="pagseguro" checked>
          <div class="option-content">
            <img src="card-icon.png" alt="PagSeguro">
            <span>Pag Seguro</span>
          </div>
        </label>
      </div>

      <button class="continuar">Continuar</button>
    </div>

    <div class="right">
      <h2>Resumo da compra</h2>
      <div class="summary-item">
        <span>Serviço</span>
        <span>R$95<sup>00</sup></span>
      </div>
      <div class="summary-item">
        <span>Taxa</span>
        <span>R$10<sup>90</sup></span>
      </div>
      <hr>
      <div class="summary-item total">
        <span>Você pagará</span>
        <span>R$105<sup>90</sup></span>
      </div>
    </div>
  </div>
</body>
</html>
