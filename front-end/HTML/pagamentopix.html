<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento PIX - CuidaFast</title>
  <link rel="stylesheet" href="../CSS/pages/pagamentopix.css">
</head>
<body>
  <div class="container">
    <a href="#" class="voltar">&lt; Voltar</a>
    <h1>Pagamento PIX</h1>

    <div class="pix-card">
      <div class="summary">
        <div class="summary-item">
          <span>Serviço</span>
          <span>R$95<sup>00</sup></span>
        </div>
        <div class="summary-item">
          <span>Taxa</span>
          <span>R$10<sup>90</sup></span>
        </div>
        <hr>
        <div class="summary-item total">
          <span>Você pagará</span>
          <span>R$105<sup>90</sup></span>
        </div>
      </div>
      <div class="qr-code">
        <img src="qr-code.png" alt="QR Code">
        <span class="pedido">Pedido #0001</span>
      </div>
    </div>

    <div class="buttons">
      <button class="copiar">📋 Copiar código Pix</button>
      <button class="ver-pedido">Ver Pedido</button>
    </div>
  </div>
</body>
</html>
