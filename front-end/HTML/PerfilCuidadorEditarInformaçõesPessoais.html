
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil - CuidaFast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../CSS/pages/perfilClienteEditarInformaçõesPessoais.css">
 
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTUwIiBoZWlnaHQ9IjQwIiB2aWV3Qm94PSIwIDAgMTUwIDQwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgo8cmVjdCB3aWR0aD0iMTUwIiBoZWlnaHQ9IjQwIiByeD0iOCIgZmlsbD0iIzBiMzM0MiIvPgo8dGV4dCB4PSI1MCUiIHk9IjUwJSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNiIgZm9udC13ZWlnaHQ9ImJvbGQiPkN1aWRhRmFzdDwvdGV4dD4KPC9zdmc+" alt="Logo CuidaFast">
    </div>
    <div class="menu" aria-label="Abrir menu">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h1>Editar Perfil</h1>

      <div class="tabs" role="tablist">
        <button class="tab active" aria-selected="true">Informações pessoais</button>
        <button class="tab" aria-selected="false">Documentos</button>
      </div>

      <div class="avatar">
        <label for="upload-foto" class="avatar-circle">
          <i class="ph ph-camera"></i>
        </label>
        <input type="file" id="upload-foto" accept="image/*" hidden>
      </div>
      

      <form>
        <div class="row">
          <div class="field">
            <label for="nome">Nome Completo</label>
            <input id="nome" type="text" placeholder="Seu nome">
          </div>
          <div class="field">
            <label for="genero">Gênero</label>
            <select id="genero">
              <option value="" disabled selected>Selecione o gênero</option>
              <option>Masculino</option>
              <option>Feminino</option>
              <option>Outro</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="data-nasc">Data de nascimento</label>
            <input id="data-nasc" type="text" placeholder="15/01/1985" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'">
          </div>
          <div class="field">
            <label for="telefone">Número de telefone</label>
            <input id="telefone" type="text" placeholder="(5511) 0000-0000">
          </div>
        </div>

        <div class="field email-field">
          <label for="email">E-mail</label>
          <div class="email-wrapper">
            <input id="email" type="email" placeholder="Mar@email.com">
            <a href="#" class="change-email">Alterar Email</a>
          </div>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <input id="senha" type="password" placeholder="Senha">
        </div>

        <div class="field">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" placeholder="Fale um pouco sobre você"></textarea>
        </div>

        <div class="buttons">
          <button type="submit" class="save">Salvar alterações</button>
          <button type="button" class="cancel">Cancelar</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    // Function to clear placeholder text when field is focused
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = document.querySelectorAll('input, textarea');
      
      inputs.forEach(input => {
        // Save the placeholder text
        input.setAttribute('data-placeholder', input.placeholder);
        
        // Clear placeholder on focus
        input.addEventListener('focus', function() {
          this.removeAttribute('placeholder');
        });
        
        // Restore placeholder if empty on blur
        input.addEventListener('blur', function() {
          if (!this.value) {
            this.placeholder = this.getAttribute('data-placeholder');
          }
        });
      });
    });
  </script>
</body>
</html>
