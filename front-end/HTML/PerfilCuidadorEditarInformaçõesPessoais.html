<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil - CuidaFast</title>
  <link rel="stylesheet" href="../CSS/pages/PerfilCuidadorEditarInformaçõesPessoais.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="logo.png" />
      
    </div>
    <div class="menu">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h1>Editar Perfil</h1>

      <div class="tabs">
        <button class="tab active">Informações pessoais</button>
        <button class="tab">Documentos</button>
      </div>

      <div class="avatar">
        <div class="avatar-circle">
          <span class="camera">&#128247;</span>
        </div>
      </div>

      <form>
        <div class="row">
          <div class="field">
            <label>Nome Completo</label>
            <input type="text" placeholder="Seu nome">
          </div>
          <div class="field">
            <label>Gênero</label>
            <select>
              <option>Masculino</option>
              <option>Feminino</option>
              <option>Outro</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Data de nascimento</label>
            <input type="text" placeholder="01/15/1985">
          </div>
          <div class="field">
            <label>Número de telefone</label>
            <input type="text" placeholder="(55)11 0000-0000">
          </div>
        </div>

        <div class="field email-field">
          <label>E-mail</label>
          <div class="email-wrapper">
            <input type="email" value="Max@gmail.com">
            <a href="#">Alterar Email</a>
          </div>
        </div>

        <div class="field">
          <label>Senha</label>
          <input type="password" value="******">
        </div>

        <div class="field">
          <label>Descrição</label>
          <textarea></textarea>
        </div>

        <small class="change-pass">Alterar senha atual</small>

        <div class="buttons">
          <button type="submit" class="save">Salvar alterações</button>
          <button type="button" class="cancel">Cancelar</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
