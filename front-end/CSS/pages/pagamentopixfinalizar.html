<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Realizado</title>
    <link rel="stylesheet" href="pagamentopixfinalizar.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button">← Voltar</button>
        </div>
        
        <div class="payment-card">
            <h1 class="success-title">Pagamento realizado com sucesso!</h1>
            
            <div class="qr-code">
                <div class="qr-placeholder"></div>
            </div>
            
            <h2 class="order-title">Resumo do Pedido #0001</h2>
            
            <div class="order-summary">
                <div class="summary-row">
                    <span class="item-label">Serviço</span>
                    <span class="item-value">R$95<sup>00</sup></span>
                </div>
                <div class="summary-row">
                    <span class="item-label">Taxa</span>
                    <span class="item-value">R$10<sup>00</sup></span>
                </div>
                <div class="summary-row total-row">
                    <span class="item-label">Total</span>
                    <span class="item-value">R$105<sup>00</sup></span>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="cancel-button">Cancelar pedido</button>
                <button class="return-button">Voltar</button>
            </div>
        </div>
    </div>
</body>
</html>
