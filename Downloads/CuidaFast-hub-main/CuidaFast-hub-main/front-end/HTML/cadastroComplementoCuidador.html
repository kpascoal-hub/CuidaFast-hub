<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete seu Cadastro - CuidaFast</title>
  <link rel="icon" type="image/svg+xml" href="../assets/icone_verde.svg">
  <link rel="stylesheet" href="../CSS/pages/cadastroComplemento.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="container">
    <!-- Botão Voltar -->
    <div class="back-button">
      <a href="cadastro.html" class="back-link">
        <i class="ph ph-arrow-left"></i>
        Voltar
      </a>
    </div>

    <!-- Formulário -->
    <main class="form-container">
      <div class="form-header">
        <h1>Complete seu Cadastro</h1>
        <p>Precisamos de mais algumas informações para finalizar</p>
      </div>

      <form id="complementForm">
        <!-- CPF -->
        <div class="form-group">
          <label for="cpf">
            <i class="ph ph-identification-card"></i>
            CPF
          </label>
          <input 
            type="text" 
            id="cpf" 
            name="cpf" 
            placeholder="000.000.000-00"
            maxlength="14"
            required
          >
        </div>

        <!-- Data de Nascimento -->
        <div class="form-group">
          <label for="dataNascimento">
            <i class="ph ph-calendar"></i>
            Data de Nascimento
          </label>
          <input 
            type="date" 
            id="dataNascimento" 
            name="dataNascimento" 
            required
          >
        </div>

        <!-- Telefone -->
        <div class="form-group">
          <label for="telefone">
            <i class="ph ph-phone"></i>
            Telefone
          </label>
          <input 
            type="tel" 
            id="telefone" 
            name="telefone" 
            placeholder="(00) 00000-0000"
            maxlength="15"
            required
          >
        </div>

        <!-- Botão Continuar -->
        <button type="submit" class="btn-submit">
          Continuar
          <i class="ph ph-arrow-right"></i>
        </button>

        <!-- Termos -->
        <p class="terms">
          Ao continuar, você concorda com nossos 
          <a href="#">Termos de Uso</a> e 
          <a href="#">Políticas de Privacidade</a>
        </p>
      </form>
    </main>
  </div>

  <script src="../JS/cadastroComplementoCuidador.js"></script>
</body>
</html>
