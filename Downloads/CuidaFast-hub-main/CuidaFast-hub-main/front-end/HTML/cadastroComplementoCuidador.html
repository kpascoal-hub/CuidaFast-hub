<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete seu Cadastro - CuidaFast</title>
  <link rel="icon" type="image/svg+xml" href="../assets/icone_verde.svg">
  <link rel="stylesheet" href="../CSS/styles.css">
  <link rel="stylesheet" href="../CSS/pages/cadastroComplementoCuidador.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="container">
    <!-- Botão Voltar -->
    <div class="back-button">
      <a href="cadastro.html" class="back-link">
        <i class="ph ph-arrow-left"></i>
        Voltar
      </a>
    </div>

    <!-- Formulário -->
    <main class="form-container">
      <div class="form-header">
        <h1>Complete seu Cadastro</h1>
        <p>Precisamos de mais algumas informações para finalizar</p>
      </div>

      <!-- Progress Bar -->
      <div class="progress-bar">
        <div class="progress-fill" style="width: 50%;"></div>
      </div>

      <div class="step-indicator">
        Passo 2 de 4
      </div>

      <!-- Info Box -->
      <div class="info-box">
        <i class="ph ph-info"></i>
        <p>Essas informações são necessárias para validar sua identidade e garantir a segurança da plataforma.</p>
      </div>

      <form id="complementForm">
        <!-- CPF -->
        <div class="form-group">
          <label for="cpf">
            <i class="ph ph-identification-card"></i>
            CPF
          </label>
          <input 
            type="text" 
            id="cpf" 
            name="cpf" 
            placeholder="000.000.000-00"
            maxlength="14"
            required
          >
        </div>

        <!-- Data de Nascimento -->
        <div class="form-group">
          <label for="dataNascimento">
            <i class="ph ph-calendar"></i>
            Data de Nascimento
          </label>
          <input 
            type="date" 
            id="dataNascimento" 
            name="dataNascimento" 
            required
          >
        </div>

        <!-- Telefone -->
        <div class="form-group">
          <label for="telefone">
            <i class="ph ph-phone"></i>
            Telefone
          </label>
          <input 
            type="tel" 
            id="telefone" 
            name="telefone" 
            placeholder="(00) 00000-0000"
            maxlength="15"
            required
          >
        </div>

        <!-- Botões -->
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="window.history.back()">
            <i class="ph ph-arrow-left"></i>
            Voltar
          </button>
          <button type="submit" class="btn btn-primary">
            Continuar
            <i class="ph ph-arrow-right"></i>
          </button>
        </div>
      </form>
    </main>
  </div>

  <script src="../JS/cadastroComplementoCuidador.js"></script>
</body>
</html>
