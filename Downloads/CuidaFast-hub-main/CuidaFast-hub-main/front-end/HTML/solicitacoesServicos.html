<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitações de Serviços - CuidaFast</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icone_verde.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="../CSS/header.css">
    <style>
        body {
            background: var(--bege);
            padding-top: 100px;
            min-height: 100vh;
        }
        
        .container-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .page-header {
            margin-bottom: 2rem;
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
            margin-bottom: 0.5rem;
        }
        
        .page-subtitle {
            color: #666;
            font-size: 1rem;
        }
        
        .tabs-container {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: #666;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: var(--azul-escuro);
            color: white;
        }
        
        .tab-btn:hover:not(.active) {
            background: rgba(27, 71, 93, 0.1);
        }
        
        .solicitacao-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        
        .solicitacao-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }
        
        .solicitacao-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .cliente-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .cliente-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--azul-escuro);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
        }
        
        .cliente-nome {
            font-weight: 700;
            color: var(--azul-escuro);
            font-size: 1.1rem;
        }
        
        .cliente-email {
            color: #666;
            font-size: 0.9rem;
        }
        
        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .status-pendente {
            background: rgba(255, 193, 7, 0.2);
            color: #f57c00;
        }
        
        .status-aceito {
            background: rgba(76, 175, 80, 0.2);
            color: #2e7d32;
        }
        
        .status-concluido {
            background: rgba(33, 150, 243, 0.2);
            color: #1565c0;
        }
        
        .solicitacao-body {
            margin-bottom: 1rem;
        }
        
        .info-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            color: #666;
        }
        
        .info-row i {
            color: var(--azul-escuro);
        }
        
        .observacoes-box {
            background: rgba(27, 71, 93, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        
        .solicitacao-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        
        .btn-aceitar {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-aceitar:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .btn-recusar {
            background: #f44336;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-recusar:hover {
            background: #da190b;
            transform: translateY(-2px);
        }
        
        .btn-concluir {
            background: var(--azul-escuro);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-concluir:hover {
            background: #163947;
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="modern-header">
        <div class="header-container">
            <div class="header-left">
                <a href="dashboard-cuidador.html" class="logo-link">
                    <img src="../assets/Logotipo_1_vetorizado.svg" alt="Logotipo CuidaFast" class="logo" />
                </a>
            </div>
            <div class="header-right">
                <a href="dashboard-cuidador.html" class="btn-secondary" style="padding: 0.5rem 1rem;">
                    <i class="ph ph-arrow-left"></i>
                    Voltar ao Dashboard
                </a>
            </div>
        </div>
    </header>

    <main class="container-main">
        <div class="page-header">
            <h1 class="page-title">
                <i class="ph ph-clipboard-text"></i>
                Solicitações de Serviços
            </h1>
            <p class="page-subtitle">Gerencie suas solicitações de serviços e atualize o status</p>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="pendentes">
                <i class="ph ph-clock"></i>
                Pendentes
            </button>
            <button class="tab-btn" data-tab="aceitos">
                <i class="ph ph-check"></i>
                Aceitos
            </button>
            <button class="tab-btn" data-tab="concluidos">
                <i class="ph ph-check-circle"></i>
                Concluídos
            </button>
            <button class="tab-btn" data-tab="todos">
                <i class="ph ph-list"></i>
                Todos
            </button>
        </div>

        <!-- Conteúdo das Tabs -->
        <div id="solicitacoesContainer">
            <!-- Será preenchido dinamicamente -->
        </div>
    </main>

    <script src="../JS/servicosManager.js"></script>
    <script>
        let currentTab = 'pendentes';

        document.addEventListener('DOMContentLoaded', function() {
            // Verificar se é cuidador
            const userData = JSON.parse(localStorage.getItem('cuidafast_user') || '{}');
            
            if (!userData.email || userData.tipo !== 'cuidador') {
                alert('⚠️ Acesso restrito a cuidadores.');
                window.location.href = '../../index.html';
                return;
            }

            // Configurar tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    carregarSolicitacoes();
                });
            });

            // Carregar solicitações iniciais
            carregarSolicitacoes();
        });

        function carregarSolicitacoes() {
            const userData = JSON.parse(localStorage.getItem('cuidafast_user') || '{}');
            const servicos = ServicosManager.getServicosCuidador(userData.email);
            
            let filteredServicos = servicos;
            
            // Filtrar por tab
            if (currentTab === 'pendentes') {
                filteredServicos = servicos.filter(s => s.status === 'pendente');
            } else if (currentTab === 'aceitos') {
                filteredServicos = servicos.filter(s => s.status === 'aceito' || s.status === 'em_andamento');
            } else if (currentTab === 'concluidos') {
                filteredServicos = servicos.filter(s => s.status === 'concluido');
            }
            
            // Ordenar por data (mais recentes primeiro)
            filteredServicos.sort((a, b) => new Date(b.dataContratacao) - new Date(a.dataContratacao));
            
            renderizarSolicitacoes(filteredServicos);
        }

        function renderizarSolicitacoes(servicos) {
            const container = document.getElementById('solicitacoesContainer');
            
            if (servicos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="ph ph-folder-open"></i>
                        <h3>Nenhuma solicitação encontrada</h3>
                        <p>Você não possui solicitações nesta categoria.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            servicos.forEach(servico => {
                const iniciais = servico.clienteNome.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const dataFormatada = new Date(servico.dataContratacao).toLocaleString('pt-BR');
                
                let statusClass = 'status-pendente';
                let statusText = 'Pendente';
                if (servico.status === 'aceito' || servico.status === 'em_andamento') {
                    statusClass = 'status-aceito';
                    statusText = servico.status === 'aceito' ? 'Aceito' : 'Em Andamento';
                } else if (servico.status === 'concluido') {
                    statusClass = 'status-concluido';
                    statusText = 'Concluído';
                }
                
                const tipoTexto = {
                    'idoso': 'Cuidado de Idosos',
                    'crianca': 'Cuidado Infantil',
                    'pet': 'Cuidado de Pets'
                }[servico.tipo] || servico.tipo;
                
                html += `
                    <div class="solicitacao-card">
                        <div class="solicitacao-header">
                            <div class="cliente-info">
                                <div class="cliente-avatar">${iniciais}</div>
                                <div>
                                    <div class="cliente-nome">${servico.clienteNome}</div>
                                    <div class="cliente-email">${servico.clienteEmail}</div>
                                </div>
                            </div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="solicitacao-body">
                            <div class="info-row">
                                <i class="ph ph-calendar"></i>
                                <strong>Data da solicitação:</strong> ${dataFormatada}
                            </div>
                            <div class="info-row">
                                <i class="ph ph-list"></i>
                                <strong>Tipo de serviço:</strong> ${tipoTexto}
                            </div>
                            <div class="info-row">
                                <i class="ph ph-identification-card"></i>
                                <strong>ID do serviço:</strong> ${servico.id}
                            </div>
                            
                            ${servico.observacoes ? `
                                <div class="observacoes-box">
                                    <strong><i class="ph ph-note"></i> Observações do cliente:</strong>
                                    <p style="margin: 0.5rem 0 0 0;">${servico.observacoes}</p>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="solicitacao-actions">
                            ${servico.status === 'pendente' ? `
                                <button class="btn-aceitar" onclick="aceitarServico('${servico.id}')">
                                    <i class="ph ph-check"></i> Aceitar Serviço
                                </button>
                                <button class="btn-recusar" onclick="recusarServico('${servico.id}')">
                                    <i class="ph ph-x"></i> Recusar
                                </button>
                            ` : ''}
                            
                            ${(servico.status === 'aceito' || servico.status === 'em_andamento') ? `
                                <button class="btn-concluir" onclick="concluirServicoModal('${servico.id}')">
                                    <i class="ph ph-check-circle"></i> Concluir Serviço
                                </button>
                            ` : ''}
                            
                            ${servico.status === 'concluido' && servico.valorPago ? `
                                <div class="info-row" style="color: #4caf50; font-weight: 600;">
                                    <i class="ph ph-currency-dollar"></i>
                                    Valor recebido: R$ ${servico.valorPago.toFixed(2)}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function aceitarServico(servicoId) {
            if (!confirm('Deseja aceitar esta solicitação de serviço?')) return;
            
            const userData = JSON.parse(localStorage.getItem('cuidafast_user') || '{}');
            const servico = ServicosManager.aceitarServico(servicoId, userData.email);
            
            if (servico) {
                alert('✅ Serviço aceito com sucesso!\n\nO cliente será notificado e as estatísticas do seu dashboard foram atualizadas.');
                carregarSolicitacoes();
            } else {
                alert('❌ Erro ao aceitar serviço.');
            }
        }

        function recusarServico(servicoId) {
            if (!confirm('Deseja recusar esta solicitação? Esta ação não pode ser desfeita.')) return;
            
            const userData = JSON.parse(localStorage.getItem('cuidafast_user') || '{}');
            const servico = ServicosManager.cancelarServico(servicoId, userData.email);
            
            if (servico) {
                alert('Serviço recusado.');
                carregarSolicitacoes();
            } else {
                alert('❌ Erro ao recusar serviço.');
            }
        }

        function concluirServicoModal(servicoId) {
            const valor = prompt('Digite o valor do serviço realizado (R$):');
            
            if (valor === null) return; // Cancelou
            
            const valorNum = parseFloat(valor.replace(',', '.'));
            
            if (isNaN(valorNum) || valorNum <= 0) {
                alert('Valor inválido.');
                return;
            }
            
            const userData = JSON.parse(localStorage.getItem('cuidafast_user') || '{}');
            const servico = ServicosManager.concluirServico(servicoId, userData.email, valorNum);
            
            if (servico) {
                alert(`✅ Serviço concluído com sucesso!\n\nValor: R$ ${valorNum.toFixed(2)}\n\nAs estatísticas do seu dashboard foram atualizadas.`);
                carregarSolicitacoes();
            } else {
                alert('❌ Erro ao concluir serviço.');
            }
        }
    </script>
</body>
</html>
